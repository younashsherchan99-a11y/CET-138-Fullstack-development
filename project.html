<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f3f4f6;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
}

.card-box {
  width: 380px;
  padding: 35px;
  border-radius: 14px;
  background: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.form-control {
  height: 45px;
  border-radius: 8px;
}

.btn-primary {
  height: 45px;
  border-radius: 8px;
  background: #3b82f6;
  border: none;
}

.btn-primary:hover {
  background: #2563eb;
}

.google-btn {
  height: 45px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #fff;
}

.small-text {
  font-size: 14px;
}

a {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card-box">

  <p class="text-muted small-text">Please enter your details</p>
  <h4 class="mb-4">Welcome back</h4>

  <form id="loginForm">
    <input type="email" class="form-control mb-3" placeholder="Email address" id="loginEmail">
    <input type="password" class="form-control mb-2" placeholder="Password" id="loginPassword">

    <div class="d-flex justify-content-between mb-3 small-text">
      <div><input type="checkbox"> Remember</div>
      <a onclick="openForgot()">Forgot password</a>
    </div>

    <button class="btn btn-primary w-100 mb-3">Sign in</button>
  </form>

  <button class="google-btn w-100 mb-3" onclick="googleLogin()">
    Sign in with Google
  </button>

  <p class="text-center small-text">
    Don't have an account? <a onclick="openSignup()">Sign up</a>
  </p>

</div>

<!-- SIGN UP MODAL -->
<div class="modal fade" id="signupModal">
  <div class="modal-dialog">
    <div class="modal-content p-4">
      <h4>Sign Up</h4>
      <input class="form-control mb-2" placeholder="Email" id="signupEmail">
      <input class="form-control mb-2" placeholder="Password" type="password" id="signupPassword">
      <button class="btn btn-primary w-100" onclick="signup()">Create Account</button>
    </div>
  </div>
</div>

<!-- FORGOT PASSWORD MODAL -->
<div class="modal fade" id="forgotModal">
  <div class="modal-dialog">
    <div class="modal-content p-4">
      <h4>Reset Password</h4>
      <input class="form-control mb-3" placeholder="Enter your email" id="forgotEmail">
      <button class="btn btn-primary w-100" onclick="resetPassword()">Send Reset Link</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// LOGIN
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPassword").value;

  if(email === "" || pass === ""){
    alert("Fill all fields");
  } else {
    alert("Login successful (Demo)");
  }
});

// GOOGLE LOGIN (SIMULATION)
function googleLogin(){
  alert("Google login working (demo only)");
}

// OPEN MODALS
function openSignup(){
  new bootstrap.Modal(document.getElementById('signupModal')).show();
}

function openForgot(){
  new bootstrap.Modal(document.getElementById('forgotModal')).show();
}

// SIGNUP
function signup(){
  let email = document.getElementById("signupEmail").value;
  let pass = document.getElementById("signupPassword").value;

  if(email === "" || pass === ""){
    alert("Fill all fields");
  } else {
    alert("Account created (demo)");
  }
}

// RESET PASSWORD
function resetPassword(){
  let email = document.getElementById("forgotEmail").value;

  if(email === ""){
    alert("Enter email");
  } else {
    alert("Reset link sent (demo)");
  }
}
</script>

</body>
</html>
